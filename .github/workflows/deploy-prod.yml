name: Deploy to Production

on:
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --configuration Release --no-build

  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    needs: test
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          password: ${{ secrets.PROD_SSH_PASSWORD }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          script: |
            set -e

            DEPLOY_DIR="/opt/ztools"
            REPO_URL="https://github.com/${{ github.repository }}.git"
            BRANCH="main"

            # Clone or update repository
            if [ -d "$DEPLOY_DIR" ]; then
              cd "$DEPLOY_DIR"
              git fetch origin
              git reset --hard origin/$BRANCH
              git clean -fd
            else
              git clone --branch $BRANCH "$REPO_URL" "$DEPLOY_DIR"
              cd "$DEPLOY_DIR"
            fi

            # Inject environment variables (only secrets, fixed values are in appsettings.Production.json)
            cat > .env << 'ENVEOF'
            CHATGPT_APIKEY=${{ secrets.CHATGPT_APIKEY }}
            MAILERSEND_MAILSENDER=${{ secrets.MAILERSEND_MAILSENDER }}
            MAILERSEND_APITOKEN=${{ secrets.MAILERSEND_APITOKEN }}
            S3_ACCESSKEY=${{ secrets.S3_ACCESSKEY }}
            S3_SECRETKEY=${{ secrets.S3_SECRETKEY }}
            ENVEOF

            # Remove leading whitespace from .env lines
            sed -i 's/^[[:space:]]*//' .env

            # Build and deploy with docker compose
            docker compose -f docker-compose-prod.yml down || true
            docker compose -f docker-compose-prod.yml build --no-cache
            docker compose -f docker-compose-prod.yml up -d

            # Cleanup old images
            docker image prune -f

            echo "Deploy completed successfully!"
