services:
  ztools-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ztools-api
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ChatGPT__ApiKey: ${CHATGPT_APIKEY}
      ChatGPT__ApiUrl: ${CHATGPT_APIURL}
      ChatGPT__Model: ${CHATGPT_MODEL}
      ChatGPT__ImageApiUrl: ${CHATGPT_IMAGEAPIURL}
      MailerSend__MailSender: ${MAILERSEND_MAILSENDER}
      MailerSend__ApiURL: ${MAILERSEND_APIURL}
      MailerSend__ApiToken: ${MAILERSEND_APITOKEN}
      S3__AccessKey: ${S3_ACCESSKEY}
      S3__SecretKey: ${S3_SECRETKEY}
      S3__Endpoint: ${S3_ENDPOINT}
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - emagine-network

networks:
  emagine-network:
    name: emagine-network
    driver: bridge
